{% extends "base.html" %}

{% block title %}Contact - CampusCare{% endblock title %}

{% block body %}
<div class="container">
  <div class="card" style="max-width:720px;margin:0 auto">
    <h2>Contact Us</h2>
    <p class="muted">Have a question or need help? Send us a message and we'll get back shortly.</p>

    <form method="post" action="{{ url_for('contact') }}" style="margin-top:12px;display:grid;gap:12px">
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" class="input" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" class="input" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" class="input" required></textarea>
      </div>

      <div>
        <button class="btn btn-primary" type="submit">Send Message</button>
      </div>
    </form>
  </div>
</div>
{% endblock body %}
