{% extends "base.html" %}

{% block title %}Admin Register - CampusCare{% endblock title %}

{% block body %}
<div class="container">
  <div class="card login-card">
    <h2 class="center">Admin Registration</h2>

    {% if error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/adminregister" style="display:grid;gap:12px;margin-top:14px">

      <!-- NAME -->
      <div>
        <label>Name</label>
        <input name="name" class="input" placeholder="Full Name" required>
      </div>

      <!-- EMAIL -->
      <div>
        <label>Email</label>
        <input name="email" type="email" class="input" placeholder="Email" required>
      </div>

      <!-- PASSWORD -->
      <div>
        <label>Password</label>
        <input name="password" type="password" class="input" placeholder="Password" required>
      </div>

      <!-- BUTTON -->
      <div class="login-meta">
        <div class="inline-links">
          Already have an account? <a href="{{ url_for('admin_login') }}">Sign in</a>
        </div>

        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn-sign" type="submit">Create Admin Account</button>
        </div>
      </div>

    </form>
  </div>
</div>
{% endblock body %}
