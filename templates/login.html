{% extends "base.html" %}

{% block title %}Login - CampusCare{% endblock title %}

{% block body %}
<div class="container">
  <div class="card login-card">
    <h2 class="center">Sign in to CampusCare</h2>

    <form method="post" action="{{ url_for('login') }}" style="display:grid;gap:12px;margin-top:14px">
      
      <div>
      <label>user type</label>
       <select class="input" name="category" required>
          <option value="">Select User Type</option>
          <option>Admin</option>
          <option>Student</option>
        </select>
      </div>
      
      <div>
        <label for="student_code">Student Code or Email</label>
        <input id="student_code" name="student_code" class="input" required>
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" class="input" required>
      </div>

      <div class="login-meta">
        <div class="inline-links">
          New to CampusCare? <a href="{{ url_for('register') }}">Create Account</a>
        </div>

        <div style="display:flex;align-items:center;gap:12px">
          <a class="forgot-link" href="/forgot">Forgot Password?</a>
          <button class="btn-sign" type="submit">Sign in</button>
        </div>
      </div>

    </form>

    {% if error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}

  </div>
</div>
{% endblock body %}
