{% extends "base.html" %}

{% block title %}Admin Login - CampusCare{% endblock title %}

{% block body %}
<div class="container">
  <div class="card login-card">
    <h2 class="center">Admin Sign in</h2>

    {% if error %}
      <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('admin_login') }}" style="display:grid;gap:12px;margin-top:14px">
      
      <div>
        <label for="Email">Email</label>
        <input id="Email" name="Email" class="input" placeholder="Admin Email" required>
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" class="input" placeholder="Password" required>
      </div>

      <div class="login-meta">
        <div class="inline-links">
          New Admin? <a href="{{ url_for('adminregister') }}">Create Account</a>
        </div>

        <div style="display:flex;align-items:center;gap:12px">
          <a class="forgot-link" href="/forgot">Forgot Password?</a>
          <button class="btn-sign" type="submit">Sign in</button>
        </div>
      </div>

    </form>
  </div>
</div>
{% endblock body %}
