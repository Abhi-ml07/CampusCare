{% extends "base.html" %}

{% block title %}Admin Login - CampusCare{% endblock title %}

{% block body %}
<div class="login-container">
    <div class="login-card">
        <h2>🔐 CampusCare Admin</h2>
        <p class="login-subtitle">Campus Issue Management System</p>

        <!-- Login Type Selector -->
        <div class="login-type-selector">
            <a href="{{ url_for('login') }}" class="login-type-btn">
                <span>👨‍🎓</span>
                <span>Student</span>
            </a>
            <button type="button" class="login-type-btn active">
                <span>🔐</span>
                <span>Admin</span>
            </button>
        </div>

        <!-- Login Form -->
        <form method="post" action="{{ url_for('admin_login') }}" style="display: grid; gap: 0;">
            <div class="form-group">
                <label for="Email">📧 Admin Email</label>
                <input 
                    type="email" 
                    id="Email" 
                    name="Email" 
                    class="input" 
                    placeholder="Enter your admin email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">🔑 Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="input" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="login-actions">
                <a href="/forgot" class="forgot-link">Forgot Password?</a>
                <button class="btn-sign" type="submit">Sign In</button>
            </div>
        </form>

        <!-- Error Message -->
        {% if error %}
            <div class="error-message">
                <span>⚠️</span>
                <span>{{ error }}</span>
            </div>
        {% endif %}

        <!-- Footer -->
        <div class="login-footer">
            New Admin? <a href="{{ url_for('adminregister') }}">Create an admin account</a>
        </div>
    </div>
</div>
{% endblock body %}
